<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .wrapper{

        border: 1px solid;
        margin: 100px;
        padding: 50px;
       
       }
      
        input{
            height:auto;
            outline: none;
            border-radius: 5%;
            border: 1px solid gray;
            padding-left: 10px;
            
        }
        h2{
            margin-bottom:0%;
        }
        p{
            margin-top:0%;
        }
        form{
           margin-top: 50px;
        }
           
    </style>
</head>

<body>
    <div class="wrapper">
        <div>
            <h2>회원가입</h2>
            <p>회원이 되어 다양한 혜택을 경험해 보세요!</p>
        </div>
        <form action="">
            <div>
                <label for="">아이디</label>
                <div>
                    <input placeholder="아이디 입력 (6-20자)" type="text" name="userid">
                    <button>중복 확인</button>
                </div>
            </div>
            <div>
                <label for="">비밀번호</label>
                <div>
                    <input placeholder="비밀번호 입력(문자,숫자,특수문자 포함 등 8-20자)" type="text" name="password">
                </div>
            </div>
            <div>
                <label for="">비밀번호 확인</label>
                <div>
                    <input placeholder="비밀번호 재입력" type="text" name="re-password">
                </div>
            </div>
            <div>
                <label for="">이름</label>
                <div>
                    <input placeholder="이름을 입력해주세요." type="text" name="name">
                </div>
            </div>
            <div>
                <label for="">전화번호</label>
                <div>
                    <input placeholder="휴대폰 번호 입력('-'제외 11자리 입력)" type="text" name="phone">
                </div>
            </div>
            <div>
                <label for="">이메일 주소</label>
            </div>
            <div>
                <input placeholder="이메일 주소" type="text" name="email">
                <input placeholder="naver.com" type="email" name="email">
            </div>
            <div>
                <div>
                    <label for="">생년월일</label>
                </div>
                <select>
                    <option value="">2000년</option>
                    <option value="">2001년</option>
                </select>
                <select>
                    <option value="">4월</option>
                    <option value="">5월</option>
                </select>
                <select>
                    <option value="">10일</option>
                    <option value="">11일</option>
                </select>
            </div>
            <div>
                <input type="submit" value="가입하기">
                <input type="submit" value="가입취소">
            </div>
        </form>
    </div>
</body>

</html>
