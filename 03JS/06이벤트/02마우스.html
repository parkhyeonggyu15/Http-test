<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
            color: gray;
        }

        body {
            margin: 0
        }

        ;

        .wrapper {}

        .wrapper>header {}

        .wrapper>main {
            height: 100vh;
        }

        .wrapper>main>section {
            height: 100%;
            display: flex;
            justify-content: left;
            align-items: start;
            gap: 15px;
        }

        .wrapper>main>section>aside {
            border: 1px solid;
            height: 100%;
            width: 200px;
        }

        .wrapper>main>section>aside>ul.items {
            padding: 10px;
        }

        .wrapper>main>section>aside>ul.items>li {
            height: 35px;
            text-align: center;
            line-height: 35px;
            border: 1px solid;
            margin-bottom: 5px;

        }

        .wrapper>main>section>aside>ul.items>li>a {
            display: block;
        }

        .wrapper>main>section>article {
            border: 1px solid;
            height: 100%;
            width: calc(100% - 200px);
            position: relative;
            left: 0;
            top: 0;
        }

        .wrapper>main>section>article .item {
            border: 1px solid;
            position: absolute;

            min-width: 100px;
            min-height: 100px;
        }

        .wrapper>main>section>article .item-style-1{background-color: red;}
        .wrapper>main>section>article .item-style-2{background-color: orange;}
        .wrapper>main>section>article .item-style-3{background-color: green;}
        .wrapper>main>section>article .item-style-4{background-color: royalblue;}
    </style>
</head>

<body>


    <div class="wrapper">
        <header></header>
        <main>
            <section>
                <aside>

                    <ul class="items">
                        <li><a href="javascript:vold(0)" draggable="true" class="item-style-1">ITEM_1</a></li>
                        <li><a href="javascript:vold(0)" draggable="true" class="item-style-2">ITEM_2</a></li>
                        <li><a href="javascript:vold(0)" draggable="true" class="item-style-3">ITEM_3</a></li>
                        <li><a href="javascript:vold(0)" draggable="true" class="item-style-4">ITEM_4</a></li>
                    </ul>

                </aside>
                <article class="board">

                </article>
            </section>
            <footer></footer>
        </main>
    </div>


        <script>
            const liEls = document.querySelectorAll('.items li');
            
            //상태정보 저장
            let dragedNode = null;      // ITEM 드래그 시작시 저장
            liEls.forEach((liEl)=>{
                // console.log("liEl",liEl);
                liEl.addEventListener('dragstart',(e)=>{
                    // console.log('dragstart',e.target);
                    dragedNode = e.target;
                });
            })

            const boardEl = document.querySelector('.board');
            boardEl.addEventListener('dragover',(e)=>{e.preventDefault();})
            boardEl.addEventListener('drop',(e)=>{
                e.preventDefault();
                // console.log("drop",e);
                // console.log("dragedNode",dragedNode);
                // console.log("OffsetX",e.offsetX);
                // console.log("OffsetY",e.offsetY);

                const newDivEl = document.createElement("div");
                newDivEl.classList.add('item');
                newDivEl.setAttribute('style',`left:${e.offsetX}px;top:${e.offsetY}px`);

                // dragedNode
                console.log('dragedNode_classList',dragedNode.classList[0]);
                newDivEl.classList.add("item", `${dragedNode.classList[0]}`);
                boardEl.appendChild(newDivEl);
            })

            // boardEl.addEventListener('',(e)=>{})

            
        </script>
</body>

</html>
