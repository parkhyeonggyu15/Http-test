<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0%;
        }

        .parent {
            /* width: 1440px; */
            width: 100%;
            height: 950px;
            border: 1px solid; 
            margin: 0 auto;
            padding: 10px;

            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .parent>.child {
            border : 1px solid;
        }

        .parent>.child:nth-child(1) {
            /* 넓어지는 비율 */
            flex-grow: 1;
            /* 좁아지는 비율 */
            flex-shrink: 0;
            /* 최소 너비 */
            flex-basis: 200px;
            align-self: stretch;
            
        }

        .parent>.child:nth-child(2) {
            flex-grow: 1;
            flex-shrink: 0;
            flex-basis: 200%;
            align-self: flex-start;
        }

        .parent>.child:nth-child(3) {
            flex-grow: 1;
            flex-shrink: 0;
            flex-basis: 200px;
            align-self: flex-end;
        }

        .parent>.child:nth-child(4) {
            flex-grow: 1;
            flex-shrink: 0;
            flex-basis: 200px;
        }

        .parent>.child:nth-child(5) {
            flex-grow: 1;
            flex-shrink: 0;
            /* flex-basis: 200px; */
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
        <div class="child">4</div>
        <div class="child">5</div>
    </div>
</body>

</html>
